<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline';">
  <title>Assistant Entrepreneur</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7f4;
      color: #1a1a18;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Titlebar drag area (macOS) */
    .titlebar {
      -webkit-app-region: drag;
      height: 36px;
      background: #f0efe9;
      border-bottom: 1px solid #e0dfd8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .titlebar span {
      font-size: 13px;
      font-weight: 500;
      color: #5f5e5a;
      -webkit-app-region: no-drag;
    }

    /* Setup screen */
    #setup-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .setup-card {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 14px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
    }
    .setup-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .setup-card p { font-size: 13px; color: #888780; margin-bottom: 1.5rem; line-height: 1.5; }
    .setup-card label { font-size: 12px; font-weight: 500; color: #5f5e5a; display: block; margin-bottom: 6px; }
    .setup-card input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d3d1c7;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #f8f7f4;
      color: #1a1a18;
      margin-bottom: 1rem;
      outline: none;
    }
    .setup-card input:focus { border-color: #534AB7; }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover { background: #3C3489; }
    .hint { font-size: 11px; color: #b4b2a9; margin-top: 10px; text-align: center; }
    .hint a { color: #534AB7; text-decoration: none; }

    /* Chat screen */
    #chat-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 10px 16px;
      border-bottom: 1px solid #e0dfd8;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0efe9;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #EEEDFE; display: flex; align-items: center; justify-content: center;
    }
    .chat-avatar i { font-size: 15px; color: #534AB7; }
    .chat-header h2 { font-size: 14px; font-weight: 500; }
    .chat-header p { font-size: 11px; color: #888780; }
    .btn-settings {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #888780;
      padding: 4px;
      border-radius: 6px;
    }
    .btn-settings:hover { background: #e0dfd8; color: #1a1a18; }
    .btn-settings i { font-size: 16px; }

    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid #e0dfd8;
      overflow-x: auto;
      flex-shrink: 0;
      background: #f8f7f4;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .qa-pill {
      white-space: nowrap;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #d3d1c7;
      border-radius: 20px;
      cursor: pointer;
      background: #fff;
      color: #5f5e5a;
      font-family: inherit;
    }
    .qa-pill:hover { background: #f0efe9; color: #1a1a18; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-av {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px; font-size: 12px;
    }
    .msg-av.ai { background: #EEEDFE; }
    .msg-av.ai i { font-size: 13px; color: #534AB7; }
    .msg-av.user { background: #E1F5EE; }
    .msg-av.user i { font-size: 13px; color: #0F6E56; }

    .bubble {
      max-width: 75%;
      padding: 9px 13px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.ai .bubble {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 4px 12px 12px 12px;
      color: #1a1a18;
    }
    .msg.user .bubble {
      background: #EEEDFE;
      border-radius: 12px 4px 12px 12px;
      color: #26215C;
    }

    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #b4b2a9; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .input-area {
      padding: 10px 14px;
      border-top: 1px solid #e0dfd8;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #f8f7f4;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d3d1c7;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #1a1a18;
      min-height: 38px;
      max-height: 120px;
      outline: none;
      line-height: 1.45;
    }
    .input-area textarea:focus { border-color: #534AB7; }
    .send-btn {
      width: 38px; height: 38px;
      background: #534AB7; border: none; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #3C3489; }
    .send-btn:disabled { background: #d3d1c7; cursor: not-allowed; }
    .send-btn i { font-size: 16px; color: #fff; }

    .error-msg {
      font-size: 12px; color: #A32D2D;
      background: #FCEBEB; border: 1px solid #F7C1C1;
      padding: 6px 10px; border-radius: 8px; margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="titlebar"><span>Assistant Entrepreneur</span></div>

<!-- Setup -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>Bienvenue, Maëlan</h1>
    <p>Entre ta clé API Anthropic pour démarrer. Elle est stockée localement sur ton ordinateur uniquement.</p>
    <label for="api-key-input">Clé API Anthropic</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" />
    <button class="btn-primary" onclick="saveApiKey()">Démarrer l'assistant</button>
    <p class="hint">Obtenir une clé : <a href="https://console.anthropic.com/settings/keys" onclick="openExternal(this)">console.anthropic.com</a></p>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-avatar"><i class="ti ti-rocket"></i></div>
    <div>
      <h2>Assistant entrepreneurial</h2>
      <p>ArtBid &amp; nouveaux projets</p>
    </div>
    <button class="btn-settings" onclick="resetKey()" title="Changer la clé API">
      <i class="ti ti-settings"></i>
    </button>
  </div>
  <div class="quick-actions">
    <button class="qa-pill" onclick="quickSend('Aide-moi à trouver des premiers clients pour ArtBid')">Trouver des clients</button>
    <button class="qa-pill" onclick="quickSend('Comment pitcher ArtBid à des investisseurs ?')">Pitcher ArtBid</button>
    <button class="qa-pill" onclick="quickSend('Génère 5 nouvelles idées de business marketplace bootstrappable')">Nouvelles idées</button>
    <button class="qa-pill" onclick="quickSend('Donne-moi un plan d\'action pour lancer ArtBid en 90 jours')">Plan 90 jours</button>
    <button class="qa-pill" onclick="quickSend('Quelles aides financières puis-je obtenir en Hauts-de-France pour ArtBid ?')">Aides financières</button>
    <button class="qa-pill" onclick="quickSend('Comment améliorer mes projections financières ArtBid ?')">Projections financières</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="inp" placeholder="Pose ta question..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">
      <i class="ti ti-send"></i>
    </button>
  </div>
</div>

<script>
  let apiKey = localStorage.getItem('anthropic_key') || ''
  let history = []
  let loading = false

  function openExternal(a) {
    a.preventDefault()
    require('electron').shell?.openExternal(a.href)
  }

  function init() {
    if (apiKey) showChat()
    else showSetup()
  }

  function showSetup() {
    document.getElementById('setup-screen').style.display = 'flex'
    document.getElementById('chat-screen').style.display = 'none'
  }

  function showChat() {
    document.getElementById('setup-screen').style.display = 'none'
    document.getElementById('chat-screen').style.display = 'flex'
    if (history.length === 0) addMsg('ai', 'Bonjour Maëlan\u00a0! Je suis prêt à t\'aider sur ArtBid et tes autres projets. Que veux-tu développer aujourd\'hui\u00a0?')
  }

  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim()
    if (!val.startsWith('sk-ant')) {
      alert('Clé invalide — elle doit commencer par sk-ant-...')
      return
    }
    apiKey = val
    localStorage.setItem('anthropic_key', apiKey)
    showChat()
  }

  function resetKey() {
    if (confirm('Changer la clé API ? La conversation sera réinitialisée.')) {
      localStorage.removeItem('anthropic_key')
      apiKey = ''
      history = []
      document.getElementById('messages').innerHTML = ''
      document.getElementById('api-key-input').value = ''
      showSetup()
    }
  }

  function scrollBottom() {
    const m = document.getElementById('messages')
    m.scrollTop = m.scrollHeight
  }

  function addMsg(role, text) {
    const m = document.getElementById('messages')
    const div = document.createElement('div')
    div.className = 'msg ' + role
    const isAI = role === 'ai'
    div.innerHTML = `
      <div class="msg-av ${isAI ? 'ai' : 'user'}">
        <i class="ti ti-${isAI ? 'rocket' : 'user'}"></i>
      </div>
      <div class="bubble">${text}</div>`
    m.appendChild(div)
    scrollBottom()
  }

  function showTyping() {
    const m = document.getElementById('messages')
    const div = document.createElement('div')
    div.className = 'msg ai'
    div.id = 'typing'
    div.innerHTML = `<div class="msg-av ai"><i class="ti ti-rocket"></i></div>
      <div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`
    m.appendChild(div)
    scrollBottom()
  }

  function hideTyping() {
    const t = document.getElementById('typing')
    if (t) t.remove()
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  }

  function quickSend(text) {
    document.getElementById('inp').value = text
    sendMsg()
  }

  async function sendMsg() {
    if (loading) return
    const inp = document.getElementById('inp')
    const text = inp.value.trim()
    if (!text) return
    inp.value = ''
    inp.style.height = 'auto'

    addMsg('user', text)
    history.push({ role: 'user', content: text })

    loading = true
    document.getElementById('send-btn').disabled = true
    showTyping()

    try {
      const reply = await window.electronAPI.claudeChat({ messages: history, apiKey })
      hideTyping()
      addMsg('ai', reply)
      history.push({ role: 'assistant', content: reply })
    } catch(e) {
      hideTyping()
      addMsg('ai', `Erreur : ${e}`)
    }

    loading = false
    document.getElementById('send-btn').disabled = false
    inp.focus()
  }

  init()
</script>
</body>
</html>
